<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Sixty-Seven Coloring 🎨</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
  <style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --hdr: 62px; --tbw: 104px;
    --bg: #fff4e6; --panel: #fff; --border: #ffd6a5;
    --radius: 16px; --btn: 56px;
  }
  html, body { width:100%; height:100%; overflow:hidden; font-family:'Nunito',sans-serif; }

  /* ── SPLASH ── */
  #splash {
    position:fixed; inset:0; z-index:9999;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    overflow:hidden; background:#0a0a0a;
  }
  #splashBg {
    position:absolute; inset:0;
    background:linear-gradient(135deg,#1a0533,#0d1b6e,#0a2e0a,#3d0000,#1a0533);
    background-size:400% 400%;
    animation:bgShift 6s ease infinite, bgIn 1s ease forwards;
  }
  @keyframes bgShift { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }
  @keyframes bgIn    { to{opacity:1} }
  .orb { position:absolute; border-radius:50%; filter:blur(60px); opacity:0; animation:orbPulse 4s ease-in-out infinite; }
  .o1{width:300px;height:300px;background:#ff6b6b;top:-80px;left:-80px;animation-delay:.5s}
  .o2{width:400px;height:400px;background:#4d96ff;bottom:-120px;right:-100px;animation-delay:1s}
  .o3{width:250px;height:250px;background:#ffd93d;top:40%;left:60%;animation-delay:1.5s}
  .o4{width:200px;height:200px;background:#6bcb77;bottom:10%;left:10%;animation-delay:2s}
  .o5{width:180px;height:180px;background:#9b5de5;top:20%;right:15%;animation-delay:.8s}
  @keyframes orbPulse { 0%,100%{opacity:.18;transform:scale(1)} 50%{opacity:.35;transform:scale(1.12)} }
  /* ── BIG background logo — fills the whole splash, sits behind text ── */
  #splashLogoBg {
    position:absolute;
    inset:0;
    z-index:1;
    display:flex;
    align-items:center;
    justify-content:center;
    pointer-events:none;
  }
  #splashLogoBg img, #splashLogoBg .logo-fb {
    width:min(90vw, 90vh);
    height:min(90vw, 90vh);
    object-fit:contain;
    opacity:0;
    filter:
      drop-shadow(0 0 60px rgba(255,107,107,.45))
      drop-shadow(0 0 120px rgba(77,150,255,.3));
    animation:logoBgFade 2s ease 0.6s forwards, logoBgFloat 8s ease-in-out 2.6s infinite;
  }
  #splashLogoBg .logo-fb {
    font-size:min(80vw,80vh);
    line-height:1;
  }
  @keyframes logoBgFade {
    from { opacity:0; transform:scale(.88); }
    to   { opacity:.22; transform:scale(1); }
  }
  @keyframes logoBgFloat {
    0%,100% { transform:scale(1)    translateY(0);    opacity:.22; }
    50%      { transform:scale(1.04) translateY(-12px); opacity:.28; }
  }

  #splashContent {
    position:relative; z-index:2;
    display:flex; flex-direction:column; align-items:center; gap:14px;
    padding:20px; text-align:center;
  }
  /* Small logo removed from content flow — now only the bg version exists */
  #splashLogoFb { display:none; font-size:clamp(80px,18vw,140px); opacity:0; animation:fadeScale 1s ease .8s forwards; }
  @keyframes fadeScale { from{opacity:0;transform:scale(.7)} to{opacity:1;transform:scale(1)} }
  #splashWelcome {
    font-family:'Fredoka One',cursive; font-size:clamp(1.1rem,3.5vw,1.8rem);
    color:rgba(255,255,255,.9); letter-spacing:2px; opacity:0;
    animation:fadeUp .8s ease 1.6s forwards;
    text-shadow:0 2px 20px rgba(0,0,0,.8), 0 0 40px rgba(0,0,0,.6);
  }
  #splashTitle {
    font-family:'Fredoka One',cursive; font-size:clamp(2.2rem,8vw,5.5rem);
    background:linear-gradient(90deg,#ff6b6b,#ffd93d,#6bcb77,#4d96ff,#9b5de5,#f15bb5,#ff6b6b);
    background-size:300% 100%;
    -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
    opacity:0; animation:fadeUp .9s ease 2.4s forwards, titleColors 3s linear 2.4s infinite;
    line-height:1.1;
    filter:drop-shadow(0 0 25px rgba(255,107,107,.6)) drop-shadow(0 3px 8px rgba(0,0,0,.9));
    white-space:nowrap;
  }
  @keyframes titleColors { 0%{background-position:0% 50%} 100%{background-position:300% 50%} }
  @keyframes fadeUp { from{opacity:0;transform:translateY(28px)} to{opacity:1;transform:translateY(0)} }
  #splashCredit {
    font-family:'Fredoka One',cursive; font-size:clamp(.8rem,2.2vw,1.15rem);
    color:rgba(255,255,255,.65); letter-spacing:1px; opacity:0;
    animation:fadeUp .8s ease 3.2s forwards;
  }
  /* ── Shared glitch base ── */
  .glitch-name {
    position:relative; display:inline-block;
    font-size:clamp(1.1rem,3.5vw,1.6rem);
  }
  .glitch-name::before, .glitch-name::after {
    content:attr(data-text); position:absolute; left:0; top:0;
    width:100%; overflow:hidden; pointer-events:none;
  }
  .glitch-name::before { clip-path:polygon(0 0,100% 0,100% 40%,0 40%); }
  .glitch-name::after  { clip-path:polygon(0 60%,100% 60%,100% 100%,0 100%); }

  /* HattyHats — gold, glitches first */
  #glitchHatty { color:#ffd93d; text-shadow:0 0 16px rgba(255,211,61,.6); animation:glitch 3.2s 3.8s infinite; }
  #glitchHatty::before { color:#ff6b6b; animation:glitchT 3.2s 3.8s infinite; }
  #glitchHatty::after  { color:#4d96ff; animation:glitchB 3.2s 3.8s infinite; }

  /* LittleHats — mint, glitches offset */
  #glitchLittle { color:#6bcb77; text-shadow:0 0 16px rgba(107,203,119,.6); animation:glitch 3.2s 5.4s infinite; }
  #glitchLittle::before { color:#f15bb5; animation:glitchT 3.2s 5.4s infinite; }
  #glitchLittle::after  { color:#ffd93d; animation:glitchB 3.2s 5.4s infinite; }

  @keyframes glitch  { 0%,88%,100%{transform:translate(0)} 89%{transform:translate(-3px,1px)} 91%{transform:translate(3px,-1px)} 93%{transform:translate(-2px,2px)} 95%{transform:translate(2px,-2px)} 97%{transform:translate(-1px,1px)} }
  @keyframes glitchT { 0%,88%,100%{transform:translate(0);opacity:0} 89%{transform:translate(4px,-2px);opacity:.9} 91%{transform:translate(-4px,1px);opacity:.9} 93%{transform:translate(2px,1px);opacity:.9} 95%{transform:translate(-2px,-1px);opacity:.9} 97%{transform:translate(1px,2px);opacity:.9} }
  @keyframes glitchB { 0%,88%,100%{transform:translate(0);opacity:0} 89%{transform:translate(-4px,2px);opacity:.9} 91%{transform:translate(4px,-1px);opacity:.9} 93%{transform:translate(-2px,-1px);opacity:.9} 95%{transform:translate(2px,1px);opacity:.9} 97%{transform:translate(-1px,-2px);opacity:.9} }
  #enterBtn {
    margin-top:10px; padding:14px 52px;
    font-family:'Fredoka One',cursive; font-size:clamp(1rem,2.8vw,1.4rem);
    color:#1a0533; background:linear-gradient(135deg,#ffd93d,#ff6b6b);
    border:none; border-radius:50px; cursor:pointer;
    box-shadow:0 0 30px rgba(255,107,107,.5),0 6px 20px rgba(0,0,0,.3);
    opacity:0; transform:translateY(20px);
    animation:fadeUp .8s ease 3.9s forwards, btnGlow 2s ease-in-out 4.5s infinite;
    transition:transform .15s,box-shadow .15s; letter-spacing:1px;
  }
  #enterBtn:hover { transform:translateY(-3px) scale(1.04); box-shadow:0 0 45px rgba(255,107,107,.7),0 10px 28px rgba(0,0,0,.3); }
  @keyframes btnGlow { 0%,100%{box-shadow:0 0 30px rgba(255,107,107,.5),0 6px 20px rgba(0,0,0,.3)} 50%{box-shadow:0 0 55px rgba(77,150,255,.7),0 6px 20px rgba(0,0,0,.3)} }
  #splash.leaving { animation:splashOut .7s ease forwards; }
  @keyframes splashOut { to{opacity:0;transform:scale(1.04);pointer-events:none} }

  /* ── MAIN APP ── */
  #app {
    display:flex; flex-direction:column;
    width:100%; height:100%;
    opacity:0; pointer-events:none;
    transition:opacity .6s ease .4s;
    background:var(--bg);
  }
  #app.visible { opacity:1; pointer-events:all; }

  /* ── HEADER ── */
  header {
    height:var(--hdr); min-height:var(--hdr); flex-shrink:0;
    background:linear-gradient(135deg,#ff6b6b,#ffd93d 50%,#6bcb77);
    display:flex; align-items:center; gap:10px; padding:0 12px;
    box-shadow:0 3px 14px rgba(0,0,0,.18); z-index:20; overflow:hidden;
  }
  .logo { font-family:'Fredoka One',cursive; font-size:1.45rem; color:#fff; text-shadow:2px 2px 0 rgba(0,0,0,.13); white-space:nowrap; flex-shrink:0; }
  .cat-tabs { display:flex; gap:6px; }
  .cat-tab {
    flex-shrink:0; background:rgba(255,255,255,.28); border:2.5px solid rgba(255,255,255,.6); border-radius:40px;
    padding:6px 16px; font-family:'Fredoka One',cursive; font-size:.9rem; color:#fff; cursor:pointer; white-space:nowrap;
    transition:background .15s,color .15s,transform .15s; -webkit-tap-highlight-color:transparent;
  }
  .cat-tab:hover,.cat-tab.active { background:#fff; color:#ff6b6b; border-color:#fff; transform:scale(1.05); }

  /* Music toggle button */
  #musicToggle {
    flex-shrink:0; margin-left:auto;
    background:rgba(255,255,255,.28); border:2.5px solid rgba(255,255,255,.6);
    border-radius:50%; width:38px; height:38px;
    font-size:1.1rem; cursor:pointer; line-height:1;
    transition:background .15s, transform .15s;
    -webkit-tap-highlight-color:transparent;
  }
  #musicToggle:hover { background:rgba(255,255,255,.5); transform:scale(1.1); }

  /* ── PAGE BAR ── */
  .page-bar {
    height:52px; min-height:52px; flex-shrink:0;
    background:rgba(255,255,255,.92); border-bottom:2px solid var(--border);
    display:flex; align-items:center; gap:8px; padding:0 12px;
    overflow-x:auto; overflow-y:hidden; scrollbar-width:none; -webkit-overflow-scrolling:touch;
    box-shadow:0 2px 8px rgba(0,0,0,.06); z-index:15;
  }
  .page-bar::-webkit-scrollbar { display:none; }
  .page-pill {
    flex-shrink:0; background:#f5f5f5; border:2px solid var(--border); border-radius:30px;
    padding:5px 14px; font-family:'Fredoka One',cursive; font-size:.82rem; color:#555;
    cursor:pointer; white-space:nowrap;
    transition:background .13s,color .13s,border-color .13s,transform .13s; -webkit-tap-highlight-color:transparent;
  }
  .page-pill:hover,.page-pill.active { background:#ff6b6b; color:#fff; border-color:#ff6b6b; transform:scale(1.06); }
  .page-pill-upload { border-style:dashed; background:#eef; color:#4d96ff; border-color:#4d96ff; }
  .page-pill-upload:hover { background:#4d96ff; color:#fff; }
  #fileInput { display:none; }

  /* ── APP BODY ── */
  .app-body { flex:1; display:flex; min-height:0; overflow:hidden; }

  /* ── SIDEBAR (desktop) ── */
  .toolbar {
    width:var(--tbw); flex-shrink:0; background:var(--panel);
    border-right:3px solid var(--border); box-shadow:3px 0 12px rgba(255,140,0,.10);
    display:flex; flex-direction:column; align-items:center;
    padding:8px 6px 12px; overflow-y:auto; overflow-x:hidden;
    scrollbar-width:thin; scrollbar-color:#ffd6a5 transparent; z-index:10;
  }
  .toolbar::-webkit-scrollbar { width:4px; }
  .toolbar::-webkit-scrollbar-thumb { background:#ffd6a5; border-radius:4px; }
  .tb-label { font-family:'Fredoka One',cursive; font-size:.59rem; color:#bbb; letter-spacing:1px; text-transform:uppercase; text-align:center; margin:6px 0 3px; }
  .tb-div { width:62%; height:2px; background:var(--border); border-radius:2px; margin:5px 0; }
  .tb-btn {
    width:var(--btn); height:var(--btn); flex-shrink:0;
    background:#f5f5f5; border:3px solid transparent; border-radius:var(--radius);
    cursor:pointer; display:flex; flex-direction:column; align-items:center;
    justify-content:center; gap:2px; font-size:1.35rem; margin-bottom:5px;
    transition:transform .14s,box-shadow .14s,border-color .14s,background .14s;
    box-shadow:0 2px 5px rgba(0,0,0,.07); -webkit-tap-highlight-color:transparent;
  }
  .tb-btn .lbl { font-family:'Fredoka One',cursive; font-size:.52rem; color:#999; line-height:1; }
  .tb-btn:hover { transform:scale(1.07); box-shadow:0 4px 12px rgba(0,0,0,.11); }
  .af { border-color:#4d96ff!important; background:#e8f2ff!important; }
  .ad { border-color:#6bcb77!important; background:#e8f7ea!important; }
  .ae { border-color:#ff6b6b!important; background:#ffe8e8!important; }
  .brush-wrap { display:flex; flex-direction:column; align-items:center; gap:3px; margin-bottom:4px; width:100%; }
  #brushSize { -webkit-appearance:none; appearance:none; width:64px; height:7px; border-radius:4px; background:linear-gradient(to right,#4d96ff,#ff6b6b); outline:none; cursor:pointer; }
  #brushSize::-webkit-slider-thumb { -webkit-appearance:none; width:20px; height:20px; border-radius:50%; background:#fff; border:3px solid #4d96ff; cursor:pointer; box-shadow:0 2px 5px rgba(0,0,0,.18); }
  #brushLbl { font-family:'Fredoka One',cursive; font-size:.56rem; color:#aaa; }
  .color-grid { display:grid; grid-template-columns:1fr 1fr; gap:7px; width:100%; padding:2px 6px; margin-bottom:4px; }
  .swatch {
    width:34px; height:34px; border-radius:50%; border:3.5px solid #fff;
    cursor:pointer; box-shadow:0 2px 6px rgba(0,0,0,.15);
    transition:transform .14s,border-color .14s,box-shadow .14s;
    justify-self:center; -webkit-tap-highlight-color:transparent; flex-shrink:0;
  }
  .swatch:hover { transform:scale(1.14); }
  .swatch.on { border-color:#111; transform:scale(1.18); box-shadow:0 0 0 3px rgba(0,0,0,.22),0 3px 10px rgba(0,0,0,.18); }
  .custom-wrap { display:flex; flex-direction:column; align-items:center; gap:2px; margin-top:2px; }
  #customColor { width:34px; height:34px; border-radius:50%; border:3.5px solid #fff; padding:0; cursor:pointer; box-shadow:0 2px 6px rgba(0,0,0,.15); appearance:none; -webkit-appearance:none; background:conic-gradient(red,yellow,lime,cyan,blue,magenta,red); overflow:hidden; }

  /* ── CANVAS AREA ── */
  .canvas-area {
    flex:1; min-width:0; min-height:0;
    display:flex; align-items:center; justify-content:center;
    overflow:hidden; position:relative;
    /* default background — overridden by JS via data-bg attribute */
    background-image: url('bubbles.gif');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    transition: background-image 0.3s;
  }
  /* Vignette so canvas pops off background */
  .canvas-area::before {
    content:''; position:absolute; inset:0; pointer-events:none; z-index:0;
    background: radial-gradient(ellipse at center, transparent 35%, rgba(0,0,0,0.22) 100%);
  }
  .zoom-wrap { position:relative; z-index:1; transform-origin:center center; touch-action:none; user-select:none; will-change:transform; }
  /* Canvas itself always has a white background */
  #mainCanvas {
    border-radius:var(--radius);
    box-shadow:0 8px 40px rgba(0,0,0,0.28),0 2px 8px rgba(0,0,0,0.14);
    cursor:crosshair; display:block; touch-action:none;
    background:#ffffff;
  }
  .zoom-btns { position:absolute; bottom:14px; right:14px; display:flex; flex-direction:column; gap:6px; z-index:12; }
  .zoom-fab {
    width:44px; height:44px; border-radius:50%;
    background:rgba(255,255,255,.92); border:2px solid var(--border);
    font-size:1.3rem; font-family:'Fredoka One',cursive; cursor:pointer;
    box-shadow:0 3px 10px rgba(0,0,0,.18); display:flex; align-items:center; justify-content:center;
    transition:transform .13s,background .13s; -webkit-tap-highlight-color:transparent;
  }
  .zoom-fab:hover { transform:scale(1.13); background:#fff; }
  #loadOvl { position:absolute; inset:0; z-index:10; background:rgba(255,255,255,.9); display:flex; align-items:center; justify-content:center; font-family:'Fredoka One',cursive; font-size:1.4rem; color:#4d96ff; border-radius:var(--radius); transition:opacity .25s; }
  #loadOvl.gone { opacity:0; pointer-events:none; }

  /* ── BACKGROUND PICKER PANEL ── */
  #bgPicker {
    position:absolute; bottom:70px; right:14px;
    background:#fff; border-radius:16px;
    box-shadow:0 8px 32px rgba(0,0,0,0.22), 0 2px 8px rgba(0,0,0,0.10);
    padding:12px; z-index:20;
    display:none; flex-direction:column; gap:8px;
    min-width:160px;
    animation:pickerIn .18s ease;
  }
  #bgPicker.open { display:flex; }
  @keyframes pickerIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
  #bgPicker .picker-title {
    font-family:'Fredoka One',cursive; font-size:.75rem; color:#bbb;
    text-transform:uppercase; letter-spacing:1px; text-align:center;
    border-bottom:2px solid var(--border); padding-bottom:6px; margin-bottom:2px;
  }
  .bg-option {
    display:flex; align-items:center; gap:10px;
    padding:6px 8px; border-radius:10px; cursor:pointer;
    border:2.5px solid transparent;
    transition:border-color .13s, background .13s;
    -webkit-tap-highlight-color:transparent;
  }
  .bg-option:hover { background:#f5f5f5; }
  .bg-option.active { border-color:#4d96ff; background:#e8f2ff; }
  .bg-thumb {
    width:44px; height:44px; border-radius:8px;
    object-fit:cover; border:2px solid var(--border);
    flex-shrink:0;
  }
  .bg-thumb-solid {
    width:44px; height:44px; border-radius:8px;
    flex-shrink:0; border:2px solid var(--border);
  }
  .bg-option-label {
    font-family:'Fredoka One',cursive; font-size:.85rem; color:#555;
  }

  /* ═══════════════════════════════════════════════
     MOBILE BOTTOM BAR
  ═══════════════════════════════════════════════ */
  .mob-bar {
    display:none;
    flex-direction:column;
    flex-shrink:0;
    width:100%;
    background:#fff;
    border-top:3px solid var(--border);
    box-shadow:0 -4px 20px rgba(0,0,0,.13);
    z-index:50;
    overflow:hidden;
  }

  /* ROW 1 — Color strip */
  .mob-color-strip {
    display:flex !important;
    flex-direction:row !important;
    align-items:center;
    gap:10px;
    padding:10px 14px;
    overflow-x:auto;
    overflow-y:hidden;
    scrollbar-width:none;
    -webkit-overflow-scrolling:touch;
    background:#fafafa;
    border-bottom:2px solid var(--border);
    min-height:68px;
  }
  .mob-color-strip::-webkit-scrollbar { display:none; }

  /* Override global .swatch size inside the strip */
  .mob-color-strip .swatch {
    width:48px !important;
    height:48px !important;
    min-width:48px !important;
    min-height:48px !important;
    flex-shrink:0 !important;
    border-radius:50% !important;
    border:4px solid #fff !important;
    box-shadow:0 2px 8px rgba(0,0,0,.18) !important;
    cursor:pointer;
    transition:transform .13s, border-color .13s, box-shadow .13s;
    -webkit-tap-highlight-color:transparent;
    justify-self:auto;
  }
  .mob-color-strip .swatch:active { transform:scale(.88) !important; }
  .mob-color-strip .swatch.on {
    border-color:#111 !important;
    transform:scale(1.18) !important;
    box-shadow:0 0 0 3px rgba(0,0,0,.25), 0 3px 10px rgba(0,0,0,.2) !important;
  }
  .mob-custom-color {
    width:48px !important; height:48px !important;
    min-width:48px !important; min-height:48px !important;
    border-radius:50% !important;
    border:4px solid #fff !important;
    background:conic-gradient(red,yellow,lime,cyan,blue,magenta,red) !important;
    appearance:none !important; -webkit-appearance:none !important;
    overflow:hidden; flex-shrink:0 !important; cursor:pointer;
    box-shadow:0 2px 8px rgba(0,0,0,.18);
  }

  /* ROW 2 — Brush dots */
  .mob-brush-strip {
    display:flex !important;
    flex-direction:row !important;
    align-items:center;
    gap:14px;
    padding:8px 14px;
    overflow-x:auto;
    overflow-y:hidden;
    scrollbar-width:none;
    background:#f0f0f0;
    border-bottom:2px solid var(--border);
    min-height:56px;
  }
  .mob-brush-strip::-webkit-scrollbar { display:none; }
  .mob-brush-strip-lbl {
    font-family:'Fredoka One',cursive; font-size:.7rem;
    color:#bbb; text-transform:uppercase; letter-spacing:1px;
    flex-shrink:0; white-space:nowrap;
  }
  .bdot {
    border-radius:50%; background:#555; border:3px solid #ddd;
    cursor:pointer; flex-shrink:0; display:block;
    transition:border-color .13s, transform .13s;
    -webkit-tap-highlight-color:transparent;
  }
  .bdot.active { border-color:#4d96ff; transform:scale(1.22); }
  .bdot:active  { transform:scale(.86); }

  /* ROW 3 — Tool buttons */
  .mob-tools {
    display:flex !important;
    flex-direction:row !important;
    align-items:center;
    justify-content:space-around;
    padding:6px 8px;
    gap:4px;
    background:#fff;
    min-height:66px;
  }
  .mob-btn {
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    flex:1; min-width:50px; max-width:72px; height:58px;
    border-radius:14px; background:#f5f5f5;
    border:3px solid transparent; font-size:1.5rem; gap:2px;
    cursor:pointer;
    transition:transform .13s, background .13s, border-color .13s;
    -webkit-tap-highlight-color:transparent;
  }

/* ── State ── */
const CW = 500, CH = 500;
let activeTool  = 'fill';
let activeColor = '#e63946';
let brushPx     = 14;
let isDrawing   = false, lastX = 0, lastY = 0;
const undoStack = [];
const MAX_UNDO  = 40;
let colorLayer   = null;
let outlineLayer = null;
let activeCat    = '67';
let activePage   = null;

/* ── DOM refs ── */
const mainCanvas = document.getElementById('mainCanvas');
const ctx        = mainCanvas.getContext('2d', { willReadFrequently: true });
const canvasArea = document.getElementById('canvasArea');
const zoomWrap   = document.getElementById('zoomWrap');
const loadOvl    = document.getElementById('loadOvl');
const toastEl    = document.getElementById('toast');
const pageBar    = document.getElementById('pageBar');
const colorGrid  = document.getElementById('colorGrid');
const brushInput = document.getElementById('brushSize');
const brushLbl   = document.getElementById('brushLbl');
const customClr  = document.getElementById('customColor');
const fileInput  = document.getElementById('fileInput');
const outlineTmp    = document.createElement('canvas');
const outlineTmpCtx = outlineTmp.getContext('2d');

/* ── Sizing ── */
function resize() {
  const ar = canvasArea.getBoundingClientRect();
  if (!ar.width || !ar.height) return;
  const pad = 20;
  const sc  = Math.min((ar.width-pad*2)/CW, (ar.height-pad*2)/CH, 2);
  const dw  = Math.round(CW*sc), dh = Math.round(CH*sc);
  mainCanvas.width = CW; mainCanvas.height = CH;
  mainCanvas.style.width = dw+'px'; mainCanvas.style.height = dh+'px';
  if (!colorLayer) colorLayer = ctx.createImageData(CW,CH);
  composite();
}
const ro = new ResizeObserver(resize);
ro.observe(canvasArea);
/*
  Single source of truth: zoomScale, panX, panY.
  One rAF loop applies the transform — no competing listeners.
  Touch: 1 finger = draw/fill  |  2 fingers = pinch-zoom + pan
*/
let zoomScale = 1, panX = 0, panY = 0;
const MIN_ZOOM = 0.5, MAX_ZOOM = 6;
let rafPending = false;

function applyTransform() {
  if (rafPending) return;
  rafPending = true;
  requestAnimationFrame(() => {
    rafPending = false;
    zoomWrap.style.transform = `translate(${panX}px,${panY}px) scale(${zoomScale})`;
  });
}

function clampPan() {
  /* Optional: keep canvas loosely within bounds when zoomed */
  const ar  = canvasArea.getBoundingClientRect();
  const cw  = mainCanvas.offsetWidth  * zoomScale;
  const ch  = mainCanvas.offsetHeight * zoomScale;
  const maxX = Math.max(0, (cw  - ar.width)  / 2 + ar.width  * 0.4);
  const maxY = Math.max(0, (ch  - ar.height) / 2 + ar.height * 0.4);
  panX = Math.min(maxX, Math.max(-maxX, panX));
  panY = Math.min(maxY, Math.max(-maxY, panY));
}

function zoomAt(newScale, originX, originY) {
  /* originX/Y are coordinates relative to canvasArea */
  newScale = Math.min(MAX_ZOOM, Math.max(MIN_ZOOM, newScale));
  const ratio = newScale / zoomScale;
  panX  = originX + (panX - originX) * ratio;
  panY  = originY + (panY - originY) * ratio;
  zoomScale = newScale;
  clampPan();
  applyTransform();
}

function zoomFit() {
  zoomScale = 1; panX = 0; panY = 0; applyTransform();
}

/* Button zoom — zoom toward center */
function centerZoom(delta) {
  const ar = canvasArea.getBoundingClientRect();
  zoomAt(zoomScale * delta, ar.width / 2, ar.height / 2);
}

/* Zoom buttons — desktop sidebar */
document.getElementById('deskZoomIn').addEventListener('click',   () => centerZoom(1.35));
document.getElementById('deskZoomOut').addEventListener('click',  () => centerZoom(0.74));
document.getElementById('deskZoomFit').addEventListener('click',  zoomFit);
document.getElementById('btnZoomIn').addEventListener('click',    () => centerZoom(1.35));
document.getElementById('btnZoomOut').addEventListener('click',   () => centerZoom(0.74));
document.getElementById('btnZoomReset').addEventListener('click', zoomFit);
/* Mobile drawer zoom */
document.getElementById('mZoomIn').addEventListener('click',  () => centerZoom(1.35));
document.getElementById('mZoomOut').addEventListener('click', () => centerZoom(0.74));
document.getElementById('mZoomFit').addEventListener('click', zoomFit);

/* Mouse wheel zoom */
canvasArea.addEventListener('wheel', e => {
  e.preventDefault();
  const ar = canvasArea.getBoundingClientRect();
  zoomAt(zoomScale * (e.deltaY < 0 ? 1.1 : 0.91), e.clientX - ar.left, e.clientY - ar.top);
}, { passive: false });

/* ── Unified touch handler ── */
/*
  Tracks up to 2 pointers. 1 pointer = draw. 2 pointers = pinch+pan.
  Storing initial state on each 2-finger start prevents jumps.
*/
const touches = new Map(); // pointerId → {x,y}

function midpoint() {
  const pts = [...touches.values()];
  return { x:(pts[0].x+pts[1].x)/2, y:(pts[0].y+pts[1].y)/2 };
}
function pinchDist() {
  const pts = [...touches.values()];
  return Math.hypot(pts[0].x-pts[1].x, pts[0].y-pts[1].y);
}

let gestureBase = null; // captured when 2nd finger lands

canvasArea.addEventListener('pointerdown', e => {
  touches.set(e.pointerId, { x: e.clientX, y: e.clientY });
  if (touches.size === 2) {
    /* 2nd finger just landed — capture baseline for this gesture */
    const ar = canvasArea.getBoundingClientRect();
    const mid = midpoint();
    gestureBase = {
      dist:  pinchDist(),
      scale: zoomScale,
      panX, panY,
      midX:  mid.x - ar.left,
      midY:  mid.y - ar.top,
    };
    isDrawing = false; /* cancel any draw in progress */
    e.preventDefault();
  }
}, { passive: false });

canvasArea.addEventListener('pointermove', e => {
  if (!touches.has(e.pointerId)) return;
  touches.set(e.pointerId, { x: e.clientX, y: e.clientY });

  if (touches.size === 2 && gestureBase) {
    e.preventDefault();
    const ar   = canvasArea.getBoundingClientRect();
    const dist = pinchDist();
    const mid  = midpoint();

    /* Scale relative to gesture start */
    const newScale = Math.min(MAX_ZOOM, Math.max(MIN_ZOOM,
      gestureBase.scale * (dist / gestureBase.dist)));

    /* Pan = how much the midpoint moved since gesture start */
    const midX = mid.x - ar.left;
    const midY = mid.y - ar.top;
    const panDX = midX - gestureBase.midX;
    const panDY = midY - gestureBase.midY;

    /* Scale around the gesture midpoint */
    const ratio = newScale / gestureBase.scale;
    panX = gestureBase.midX + (gestureBase.panX - gestureBase.midX) * ratio + panDX;
    panY = gestureBase.midY + (gestureBase.panY - gestureBase.midY) * ratio + panDY;
    zoomScale = newScale;
    clampPan();
    applyTransform();
  }
}, { passive: false });

canvasArea.addEventListener('pointerup',     e => { touches.delete(e.pointerId); if(touches.size < 2) gestureBase = null; });
canvasArea.addEventListener('pointercancel', e => { touches.delete(e.pointerId); if(touches.size < 2) gestureBase = null; });
/* Prevent default iOS rubber-band during pinch */
canvasArea.addEventListener('touchmove', e => { if(e.touches.length>1) e.preventDefault(); }, { passive:false });

/* ── Composite ── */
function composite() {
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, CW, CH);
  if (colorLayer) ctx.putImageData(colorLayer, 0, 0);
  if (outlineLayer) {
    const tmp = ctx.createImageData(CW, CH);
    tmp.data.set(outlineLayer);
    outlineTmp.width = CW; outlineTmp.height = CH;
    outlineTmpCtx.putImageData(tmp, 0, 0);
    ctx.drawImage(outlineTmp, 0, 0);
  }
}

/* ── Load page ── */
function loadPage(pageObj) {
  if (!pageObj) return;
  activePage = pageObj;
  loadOvl.classList.remove('gone');
  colorLayer = null; outlineLayer = null;
  undoStack.length = 0;
  zoomFit();

  if (pageObj.type === 'svg') {
    const svgStr = SVG_DATA[pageObj.key];
    if (!svgStr) { loadOvl.classList.add('gone'); toast('SVG not found 😕'); return; }
    processSvgString(svgStr);
  } else {
    // PNG: load as image
    const img = new Image();
    img.onload = () => {
      const off = document.createElement('canvas');
      off.width = CW; off.height = CH;
      const offCtx = off.getContext('2d', { willReadFrequently: true });
      offCtx.fillStyle = '#fff';
      offCtx.fillRect(0,0,CW,CH);
      // Scale to fit
      const sc2 = Math.min(CW/img.naturalWidth, CH/img.naturalHeight, 1);
      const dw = img.naturalWidth*sc2, dh = img.naturalHeight*sc2;
      offCtx.drawImage(img, (CW-dw)/2, (CH-dh)/2, dw, dh);
      bakeOutline(offCtx.getImageData(0,0,CW,CH).data);
      colorLayer = ctx.createImageData(CW,CH);
      resize(); composite();
      setTimeout(()=>loadOvl.classList.add('gone'),80);
    };
    img.onerror = () => { loadOvl.classList.add('gone'); toast('Could not load image.\nMake sure '+pageObj.src+' is in the same folder 😕'); };
    img.src = pageObj.src;
  }
}

function processSvgString(svgStr) {
  const blob = new Blob([svgStr],{type:'image/svg+xml;charset=utf-8'});
  const url  = URL.createObjectURL(blob);
  const img  = new Image();
  img.onload = () => {
    URL.revokeObjectURL(url);
    const off = document.createElement('canvas');
    off.width = CW; off.height = CH;
    const offCtx = off.getContext('2d',{willReadFrequently:true});
    offCtx.drawImage(img,0,0,CW,CH);
    bakeOutline(offCtx.getImageData(0,0,CW,CH).data);
    colorLayer = ctx.createImageData(CW,CH);
    resize(); composite();
    setTimeout(()=>loadOvl.classList.add('gone'),80);
  };
  img.onerror = () => { URL.revokeObjectURL(url); loadOvl.classList.add('gone'); toast('Could not load page 😕'); };
  img.src = url;
}

function bakeOutline(rawData) {
  const outData = new Uint8ClampedArray(CW*CH*4);
  for (let i=0;i<rawData.length;i+=4){
    const r=rawData[i],g=rawData[i+1],b=rawData[i+2];
    const isWhite = r>220&&g>220&&b>220;
    if(isWhite){ outData[i]=outData[i+1]=outData[i+2]=outData[i+3]=0; }
    else { outData[i]=r;outData[i+1]=g;outData[i+2]=b;outData[i+3]=255; }
  }
  outlineLayer = outData;
}

/* ── Category / page bar ── */
function buildPageBar(cat) {
  pageBar.innerHTML = '';
  const pages = CATS[cat]?.pages ?? [];
  pages.forEach((p,i) => {
    const btn = document.createElement('button');
    btn.className = 'page-pill' + (i===0?' active':'');
    btn.textContent = p.label;
    btn.addEventListener('click', () => {
      pageBar.querySelectorAll('.page-pill').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      loadPage(p);
    });
    pageBar.appendChild(btn);
  });
  if (cat === 'upload') {
    const upBtn = document.createElement('button');
    upBtn.className = 'page-pill page-pill-upload';
    upBtn.textContent = '+ Upload Image';
    upBtn.addEventListener('click', ()=>fileInput.click());
    pageBar.appendChild(upBtn);
  }
  // Auto-load first page
  if (pages.length > 0) loadPage(pages[0]);
}

document.getElementById('catTabs').addEventListener('click', e => {
  const tab = e.target.closest('.cat-tab');
  if (!tab) return;
  activeCat = tab.dataset.cat;
  document.querySelectorAll('.cat-tab').forEach(t=>t.classList.toggle('active', t===tab));
  buildPageBar(activeCat);
});

/* ── Flood fill ── */
function hexToRgb(hex){const h=hex.replace('#','');return[parseInt(h.slice(0,2),16),parseInt(h.slice(2,4),16),parseInt(h.slice(4,6),16)];}
function isWall(pos){if(!outlineLayer)return false;const i=pos*4;return outlineLayer[i+3]>60;}

function floodFill(sx,sy){
  if(!outlineLayer||!colorLayer)return;
  const [fr,fg,fb]=hexToRgb(activeColor);
  const pos0=sy*CW+sx;
  if(isWall(pos0))return;
  pushUndo();
  const cd=colorLayer.data;
  const si=pos0*4;
  const startR=cd[si],startG=cd[si+1],startB=cd[si+2],startA=cd[si+3];
  if(startA===255&&startR===fr&&startG===fg&&startB===fb)return;
  const TOL=20;
  const matches=pi=>{
    const a=cd[pi+3];
    if(startA===0)return a===0;
    return a===255&&Math.abs(cd[pi]-startR)<=TOL&&Math.abs(cd[pi+1]-startG)<=TOL&&Math.abs(cd[pi+2]-startB)<=TOL;
  };
  const vis=new Uint8Array(CW*CH);
  const stk=[pos0];
  while(stk.length){
    const pos=stk.pop();
    if(vis[pos])continue;
    if(isWall(pos))continue;
    const pi=pos*4;
    if(!matches(pi))continue;
    vis[pos]=1;
    cd[pi]=fr;cd[pi+1]=fg;cd[pi+2]=fb;cd[pi+3]=255;
    const x=pos%CW,y=(pos/CW)|0;
    if(x>0)stk.push(pos-1);
    if(x<CW-1)stk.push(pos+1);
    if(y>0)stk.push(pos-CW);
    if(y<CH-1)stk.push(pos+CW);
  }
  composite();
}

/* ── Undo/Clear ── */
function pushUndo(){
  if(undoStack.length>=MAX_UNDO)undoStack.shift();
  const c=ctx.createImageData(CW,CH);c.data.set(colorLayer.data);undoStack.push(c);
}
function undo(){if(!undoStack.length){toast('Nothing to undo!');return;}colorLayer=undoStack.pop();composite();toast('Undone ↩️');}
function clearColors(){undoStack.length=0;colorLayer=ctx.createImageData(CW,CH);composite();toast('Cleared! 🧹');}

/* ── Draw/Erase ── */
function drawAt(x,y,isFirst){
  if(!colorLayer)return;
  const tmpC=document.createElement('canvas');tmpC.width=CW;tmpC.height=CH;
  const tc=tmpC.getContext('2d');
  tc.putImageData(colorLayer,0,0);
  tc.lineWidth=brushPx;tc.lineCap='round';tc.lineJoin='round';
  if(activeTool==='eraser'){tc.globalCompositeOperation='destination-out';tc.strokeStyle=tc.fillStyle='rgba(0,0,0,1)';}
  else{tc.globalCompositeOperation='source-over';tc.strokeStyle=tc.fillStyle=activeColor;}
  if(isFirst){tc.beginPath();tc.arc(x,y,brushPx/2,0,Math.PI*2);tc.fill();}
  else{tc.beginPath();tc.moveTo(lastX,lastY);tc.lineTo(x,y);tc.stroke();}
  colorLayer=tc.getImageData(0,0,CW,CH);composite();
}

/* ── Pointer events — skip if 2-finger gesture ── */
let activePointers = 0;
function getCanvasXY(e){
  const r=mainCanvas.getBoundingClientRect();
  const cx=e.clientX??(e.touches?.[0]?.clientX??0);
  const cy=e.clientY??(e.touches?.[0]?.clientY??0);
  return[Math.round((cx-r.left)*(CW/r.width)),Math.round((cy-r.top)*(CH/r.height))];
}

mainCanvas.addEventListener('pointerdown',e=>{
  activePointers++;
  if(activePointers>1){isDrawing=false;return;} // ignore if multi-touch
  e.preventDefault();
  const[x,y]=getCanvasXY(e);
  if(x<0||x>=CW||y<0||y>=CH)return;
  if(activeTool==='fill'){floodFill(x,y);}
  else{isDrawing=true;pushUndo();drawAt(x,y,true);[lastX,lastY]=[x,y];}
},{passive:false});

mainCanvas.addEventListener('pointermove',e=>{
  if(!isDrawing||activePointers>1)return;
  e.preventDefault();
  const[x,y]=getCanvasXY(e);
  drawAt(x,y,false);[lastX,lastY]=[x,y];
},{passive:false});

['pointerup','pointercancel','pointerleave'].forEach(ev=>mainCanvas.addEventListener(ev,()=>{activePointers=Math.max(0,activePointers-1);if(activePointers===0)isDrawing=false;}));

/* ── Tool switching ── */
function setTool(t){
  activeTool=t;
  ['btnFill','btnDraw','btnEraser'].forEach(id=>{const b=document.getElementById(id);if(b){b.classList.remove('af','ad','ae');}});
  ['mFill','mDraw','mEraser'].forEach(id=>{const b=document.getElementById(id);if(b){b.classList.remove('af','ad','ae');}});
  const cls=t==='fill'?'af':t==='draw'?'ad':'ae';
  document.getElementById('btnFill')?.classList.toggle('af',t==='fill');
  document.getElementById('btnDraw')?.classList.toggle('ad',t==='draw');
  document.getElementById('btnEraser')?.classList.toggle('ae',t==='eraser');
  document.getElementById('mFill')?.classList.toggle('af',t==='fill');
  document.getElementById('mDraw')?.classList.toggle('ad',t==='draw');
  document.getElementById('mEraser')?.classList.toggle('ae',t==='eraser');
}

/* ── Color ── */
function pickColor(hex){
  activeColor=hex;
  document.querySelectorAll('.swatch').forEach(s=>s.classList.toggle('on',s.dataset.c===hex));
}

/* ── Save ── */
function saveImage(){
  const tmp=document.createElement('canvas');tmp.width=CW;tmp.height=CH;
  const tc=tmp.getContext('2d');tc.fillStyle='#fff';tc.fillRect(0,0,CW,CH);
  if(colorLayer)tc.putImageData(colorLayer,0,0);
  if(outlineLayer){const id=tc.createImageData(CW,CH);id.data.set(outlineLayer);outlineTmp.width=CW;outlineTmp.height=CH;outlineTmpCtx.putImageData(id,0,0);tc.drawImage(outlineTmp,0,0);}
  const a=document.createElement('a');a.download='sixty-seven.png';a.href=tmp.toDataURL('image/png');a.click();toast('Saved! 💾');
}

/* ── Upload ── */
function handleUpload(file){
  if(!file||!file.type.startsWith('image/')){toast('Pick an image or SVG 🖼️');return;}
  const name=file.name.replace(/\.[^.]+$/,'').slice(0,14);
  const isSvg=file.type==='image/svg+xml'||file.name.endsWith('.svg');
  const reader=new FileReader();
  reader.onload=ev=>{
    const key='up_'+Date.now();
    const pageObj={ key, label:'📷 '+name, type: isSvg?'svg':'png', src: null, _data: ev.target.result };
    CATS.upload.pages.push(pageObj);
    // Switch to upload category
    activeCat='upload';
    document.querySelectorAll('.cat-tab').forEach(t=>t.classList.toggle('active',t.dataset.cat==='upload'));
    buildPageBar('upload');
    // Activate the new page
    const pills=pageBar.querySelectorAll('.page-pill:not(.page-pill-upload)');
    pills.forEach(p=>p.classList.remove('active'));
    if(pills.length)pills[pills.length-1].classList.add('active');
    // Load it
    if(isSvg){processSvgString(ev.target.result);}
    else{
      const img=new Image();
      img.onload=()=>{
        const off=document.createElement('canvas');off.width=CW;off.height=CH;
        const oc=off.getContext('2d',{willReadFrequently:true});
        oc.fillStyle='#fff';oc.fillRect(0,0,CW,CH);
        const sc2=Math.min(CW/img.naturalWidth,CH/img.naturalHeight,1);
        const dw=img.naturalWidth*sc2,dh=img.naturalHeight*sc2;
        oc.drawImage(img,(CW-dw)/2,(CH-dh)/2,dw,dh);
        bakeOutline(oc.getImageData(0,0,CW,CH).data);
        colorLayer=ctx.createImageData(CW,CH);
        resize();composite();
        setTimeout(()=>loadOvl.classList.add('gone'),80);
      };
      img.src=ev.target.result;
      loadOvl.classList.remove('gone');
      colorLayer=null;outlineLayer=null;undoStack.length=0;
    }
    toast('Uploaded! 🎨');
  };
  if(isSvg)reader.readAsText(file);else reader.readAsDataURL(file);
}

let toastTimer;

/* ── Splash → App ── */

/* ── Background switcher ── */
/*
  TO ADD A NEW BACKGROUND:
  1. Add a new entry to BACKGROUNDS below with a unique key, the gif/image src, and a label.
  2. Add a matching .bg-option block inside #bgPicker in the HTML.
  3. Add a matching .mob-bg-thumb block inside the mobile drawer BG row.
  That's it — no other changes needed.
*/
const BACKGROUNDS = {
  bubbles:  { src: 'bubbles.gif',  label: 'Bubbles'   },
  bubbles1: { src: 'bubbles1.gif', label: 'Bubbles 2' },
  /* ADD MORE HERE:
  stars:   { src: 'stars.gif',   label: 'Stars'  },
  confetti:{ src: 'confetti.gif',label: 'Confetti' },
  */
};

let activeBg = 'bubbles';

function setBackground(key) {
  const bg = BACKGROUNDS[key];
  if (!bg) return;
  activeBg = key;

  /* Apply to canvas area */
  canvasArea.style.backgroundImage = `url('${bg.src}')`;

  /* Update desktop picker active state */
  document.querySelectorAll('.bg-option').forEach(el =>
    el.classList.toggle('active', el.dataset.bg === key));

  /* Update mobile picker active state */
  document.querySelectorAll('.mob-bg-thumb').forEach(el =>
    el.classList.toggle('active', el.dataset.bg === key));
}

});

/* Close picker when clicking elsewhere */
document.addEventListener('click', e => {

  }
});

bgPicker.addEventListener('click', e => {

document.querySelectorAll('.mob-bg-thumb').forEach(el => {

});

document.getElementById('musicToggle').addEventListener('click', ()=>{
