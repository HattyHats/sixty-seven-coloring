<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Sixty-Seven Coloring 🎨</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
  <style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --hdr: 62px; --tbw: 104px;
    --bg: #fff4e6; --panel: #fff; --border: #ffd6a5;
    --radius: 16px; --btn: 56px;
  }
  html, body { width:100%; height:100%; overflow:hidden; font-family:'Nunito',sans-serif; }

  /* ── SPLASH ── */
  #splash {
    position:fixed; inset:0; z-index:9999;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    overflow:hidden; background:#0a0a0a;
  }
  #splashBg {
    position:absolute; inset:0;
    background:linear-gradient(135deg,#1a0533,#0d1b6e,#0a2e0a,#3d0000,#1a0533);
    background-size:400% 400%;
    animation:bgShift 6s ease infinite, bgIn 1s ease forwards;
  }
  @keyframes bgShift { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }
  @keyframes bgIn    { to{opacity:1} }
  .orb { position:absolute; border-radius:50%; filter:blur(60px); opacity:0; animation:orbPulse 4s ease-in-out infinite; }
  .o1{width:300px;height:300px;background:#ff6b6b;top:-80px;left:-80px;animation-delay:.5s}
  .o2{width:400px;height:400px;background:#4d96ff;bottom:-120px;right:-100px;animation-delay:1s}
  .o3{width:250px;height:250px;background:#ffd93d;top:40%;left:60%;animation-delay:1.5s}
  .o4{width:200px;height:200px;background:#6bcb77;bottom:10%;left:10%;animation-delay:2s}
  .o5{width:180px;height:180px;background:#9b5de5;top:20%;right:15%;animation-delay:.8s}
  @keyframes orbPulse { 0%,100%{opacity:.18;transform:scale(1)} 50%{opacity:.35;transform:scale(1.12)} }
  /* ── BIG background logo — fills the whole splash, sits behind text ── */
  #splashLogoBg {
    position:absolute;
    inset:0;
    z-index:1;
    display:flex;
    align-items:center;
    justify-content:center;
    pointer-events:none;
  }
  #splashLogoBg img, #splashLogoBg .logo-fb {
    width:min(90vw, 90vh);
    height:min(90vw, 90vh);
    object-fit:contain;
    opacity:0;
    filter:
      drop-shadow(0 0 60px rgba(255,107,107,.45))
      drop-shadow(0 0 120px rgba(77,150,255,.3));
    animation:logoBgFade 2s ease 0.6s forwards, logoBgFloat 8s ease-in-out 2.6s infinite;
  }
  #splashLogoBg .logo-fb {
    font-size:min(80vw,80vh);
    line-height:1;
  }
  @keyframes logoBgFade {
    from { opacity:0; transform:scale(.88); }
    to   { opacity:.22; transform:scale(1); }
  }
  @keyframes logoBgFloat {
    0%,100% { transform:scale(1)    translateY(0);    opacity:.22; }
    50%      { transform:scale(1.04) translateY(-12px); opacity:.28; }
  }

  #splashContent {
    position:relative; z-index:2;
    display:flex; flex-direction:column; align-items:center; gap:14px;
    padding:20px; text-align:center;
  }
  /* Small logo removed from content flow — now only the bg version exists */
  #splashLogoFb { display:none; font-size:clamp(80px,18vw,140px); opacity:0; animation:fadeScale 1s ease .8s forwards; }
  @keyframes fadeScale { from{opacity:0;transform:scale(.7)} to{opacity:1;transform:scale(1)} }
  #splashWelcome {
    font-family:'Fredoka One',cursive; font-size:clamp(1.1rem,3.5vw,1.8rem);
    color:rgba(255,255,255,.9); letter-spacing:2px; opacity:0;
    animation:fadeUp .8s ease 1.6s forwards;
    text-shadow:0 2px 20px rgba(0,0,0,.8), 0 0 40px rgba(0,0,0,.6);
  }
  #splashTitle {
    font-family:'Fredoka One',cursive; font-size:clamp(2.2rem,8vw,5.5rem);
    background:linear-gradient(90deg,#ff6b6b,#ffd93d,#6bcb77,#4d96ff,#9b5de5,#f15bb5,#ff6b6b);
    background-size:300% 100%;
    -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
    opacity:0; animation:fadeUp .9s ease 2.4s forwards, titleColors 3s linear 2.4s infinite;
    line-height:1.1;
    filter:drop-shadow(0 0 25px rgba(255,107,107,.6)) drop-shadow(0 3px 8px rgba(0,0,0,.9));
    white-space:nowrap;
  }
  @keyframes titleColors { 0%{background-position:0% 50%} 100%{background-position:300% 50%} }
  @keyframes fadeUp { from{opacity:0;transform:translateY(28px)} to{opacity:1;transform:translateY(0)} }
  #splashCredit {
    font-family:'Fredoka One',cursive; font-size:clamp(.8rem,2.2vw,1.15rem);
    color:rgba(255,255,255,.65); letter-spacing:1px; opacity:0;
    animation:fadeUp .8s ease 3.2s forwards;
  }
  #glitchName {
    color:#ffd93d; position:relative; display:inline-block;
    animation:glitch 2.8s 3.8s infinite;
  }
  #glitchName::before,#glitchName::after {
    content:attr(data-text); position:absolute; left:0; top:0; width:100%; overflow:hidden;
  }
  #glitchName::before {
    color:#ff6b6b; animation:glitchT 2.8s 3.8s infinite;
    clip-path:polygon(0 0,100% 0,100% 40%,0 40%);
  }
  #glitchName::after {
    color:#4d96ff; animation:glitchB 2.8s 3.8s infinite;
    clip-path:polygon(0 60%,100% 60%,100% 100%,0 100%);
  }
  @keyframes glitch  { 0%,90%,100%{transform:translate(0)} 91%{transform:translate(-3px,1px)} 93%{transform:translate(3px,-1px)} 95%{transform:translate(-2px,2px)} 97%{transform:translate(2px,-2px)} }
  @keyframes glitchT { 0%,90%,100%{transform:translate(0);opacity:0} 91%{transform:translate(4px,-2px);opacity:.85} 93%{transform:translate(-4px,1px);opacity:.85} 95%{transform:translate(2px,1px);opacity:.85} 97%{transform:translate(-2px,-1px);opacity:.85} }
  @keyframes glitchB { 0%,90%,100%{transform:translate(0);opacity:0} 91%{transform:translate(-4px,2px);opacity:.85} 93%{transform:translate(4px,-1px);opacity:.85} 95%{transform:translate(-2px,-1px);opacity:.85} 97%{transform:translate(2px,1px);opacity:.85} }
  #enterBtn {
    margin-top:10px; padding:14px 52px;
    font-family:'Fredoka One',cursive; font-size:clamp(1rem,2.8vw,1.4rem);
    color:#1a0533; background:linear-gradient(135deg,#ffd93d,#ff6b6b);
    border:none; border-radius:50px; cursor:pointer;
    box-shadow:0 0 30px rgba(255,107,107,.5),0 6px 20px rgba(0,0,0,.3);
    opacity:0; transform:translateY(20px);
    animation:fadeUp .8s ease 3.9s forwards, btnGlow 2s ease-in-out 4.5s infinite;
    transition:transform .15s,box-shadow .15s; letter-spacing:1px;
  }
  #enterBtn:hover { transform:translateY(-3px) scale(1.04); box-shadow:0 0 45px rgba(255,107,107,.7),0 10px 28px rgba(0,0,0,.3); }
  @keyframes btnGlow { 0%,100%{box-shadow:0 0 30px rgba(255,107,107,.5),0 6px 20px rgba(0,0,0,.3)} 50%{box-shadow:0 0 55px rgba(77,150,255,.7),0 6px 20px rgba(0,0,0,.3)} }
  #splash.leaving { animation:splashOut .7s ease forwards; }
  @keyframes splashOut { to{opacity:0;transform:scale(1.04);pointer-events:none} }

  /* ── MAIN APP ── */
  #app {
    display:flex; flex-direction:column;
    width:100%; height:100%;
    opacity:0; pointer-events:none;
    transition:opacity .6s ease .4s;
    background:var(--bg);
  }
  #app.visible { opacity:1; pointer-events:all; }

  header {
    height:var(--hdr); min-height:var(--hdr); flex-shrink:0;
    background:linear-gradient(135deg,#ff6b6b,#ffd93d 50%,#6bcb77);
    display:flex; align-items:center; gap:10px; padding:0 12px;
    box-shadow:0 3px 14px rgba(0,0,0,.18); z-index:20; overflow:hidden;
  }
  .logo {
    font-family:'Fredoka One',cursive; font-size:1.45rem; color:#fff;
    text-shadow:2px 2px 0 rgba(0,0,0,.13); white-space:nowrap; flex-shrink:0;
  }
  .page-pills {
    display:flex; gap:7px; overflow-x:auto; flex:1; min-width:0;
    padding:4px 0; scrollbar-width:none; -webkit-overflow-scrolling:touch;
  }
  .page-pills::-webkit-scrollbar { display:none; }
  .pill {
    flex-shrink:0; background:rgba(255,255,255,.28);
    border:2.5px solid rgba(255,255,255,.6); border-radius:40px;
    padding:5px 13px; font-family:'Fredoka One',cursive; font-size:.82rem;
    color:#fff; cursor:pointer; white-space:nowrap;
    transition:background .15s,color .15s,transform .15s;
    -webkit-tap-highlight-color:transparent;
  }
  .pill:hover,.pill.active { background:#fff; color:#ff6b6b; border-color:#fff; transform:scale(1.06); }
  .pill-upload { border-style:dashed; }
  .pill-upload:hover { color:#4d96ff; }
  #fileInput { display:none; }

  .app-body { flex:1; display:flex; min-height:0; overflow:hidden; }

  /* ── TOOLBAR ── */
  .toolbar {
    width:var(--tbw); flex-shrink:0; background:var(--panel);
    border-right:3px solid var(--border); box-shadow:3px 0 12px rgba(255,140,0,.10);
    display:flex; flex-direction:column; align-items:center;
    padding:8px 6px 12px; overflow-y:auto; overflow-x:hidden;
    scrollbar-width:thin; scrollbar-color:#ffd6a5 transparent; z-index:10;
  }
  .toolbar::-webkit-scrollbar { width:4px; }
  .toolbar::-webkit-scrollbar-thumb { background:#ffd6a5; border-radius:4px; }
  .tb-label {
    font-family:'Fredoka One',cursive; font-size:.59rem; color:#bbb;
    letter-spacing:1px; text-transform:uppercase; text-align:center; margin:6px 0 3px;
  }
  .tb-div { width:62%; height:2px; background:var(--border); border-radius:2px; margin:5px 0; }
  .tb-btn {
    width:var(--btn); height:var(--btn); flex-shrink:0;
    background:#f5f5f5; border:3px solid transparent; border-radius:var(--radius);
    cursor:pointer; display:flex; flex-direction:column; align-items:center;
    justify-content:center; gap:2px; font-size:1.35rem; margin-bottom:5px;
    transition:transform .14s,box-shadow .14s,border-color .14s,background .14s;
    box-shadow:0 2px 5px rgba(0,0,0,.07); -webkit-tap-highlight-color:transparent;
  }
  .tb-btn .lbl { font-family:'Fredoka One',cursive; font-size:.52rem; color:#999; line-height:1; }
  .tb-btn:hover { transform:scale(1.07); box-shadow:0 4px 12px rgba(0,0,0,.11); }
  .af { border-color:#4d96ff!important; background:#e8f2ff!important; }
  .ad { border-color:#6bcb77!important; background:#e8f7ea!important; }
  .ae { border-color:#ff6b6b!important; background:#ffe8e8!important; }
  .brush-wrap { display:flex; flex-direction:column; align-items:center; gap:3px; margin-bottom:4px; width:100%; }
  #brushSize {
    -webkit-appearance:none; appearance:none; width:64px; height:7px;
    border-radius:4px; background:linear-gradient(to right,#4d96ff,#ff6b6b); outline:none; cursor:pointer;
  }
  #brushSize::-webkit-slider-thumb {
    -webkit-appearance:none; width:20px; height:20px; border-radius:50%;
    background:#fff; border:3px solid #4d96ff; cursor:pointer; box-shadow:0 2px 5px rgba(0,0,0,.18);
  }
  #brushLbl { font-family:'Fredoka One',cursive; font-size:.56rem; color:#aaa; }
  .color-grid { display:grid; grid-template-columns:1fr 1fr; gap:7px; width:100%; padding:2px 6px; margin-bottom:4px; }
  .swatch {
    width:34px; height:34px; border-radius:50%; border:3.5px solid #fff;
    cursor:pointer; box-shadow:0 2px 6px rgba(0,0,0,.15);
    transition:transform .14s,border-color .14s,box-shadow .14s;
    justify-self:center; -webkit-tap-highlight-color:transparent;
  }
  .swatch:hover { transform:scale(1.14); }
  .swatch.on { border-color:#111; transform:scale(1.18); box-shadow:0 0 0 3px rgba(0,0,0,.22),0 3px 10px rgba(0,0,0,.18); }
  .custom-wrap { display:flex; flex-direction:column; align-items:center; gap:2px; margin-top:2px; }
  #customColor {
    width:34px; height:34px; border-radius:50%; border:3.5px solid #fff;
    padding:0; cursor:pointer; box-shadow:0 2px 6px rgba(0,0,0,.15);
    appearance:none; -webkit-appearance:none;
    background:conic-gradient(red,yellow,lime,cyan,blue,magenta,red); overflow:hidden;
  }

  /* ── CANVAS AREA ── */
  .canvas-area {
    flex:1; min-width:0; min-height:0;
    display:flex; align-items:center; justify-content:center;
    background:
      radial-gradient(circle at 20% 40%,rgba(255,107,107,.07) 0%,transparent 55%),
      radial-gradient(circle at 78% 70%,rgba(77,150,255,.07) 0%,transparent 55%),
      #fff4e6;
    overflow:hidden; position:relative;
  }
  /* Single canvas — everything drawn onto it */
  #mainCanvas {
    border-radius:var(--radius);
    box-shadow:0 6px 36px rgba(0,0,0,.13),0 2px 8px rgba(0,0,0,.08);
    cursor:crosshair;
    display:block;
    touch-action:none;
  }
  #loadOvl {
    position:absolute; inset:0; z-index:10;
    background:rgba(255,255,255,.9);
    display:flex; align-items:center; justify-content:center;
    font-family:'Fredoka One',cursive; font-size:1.4rem; color:#4d96ff;
    border-radius:var(--radius); transition:opacity .25s;
  }
  #loadOvl.gone { opacity:0; pointer-events:none; }

  /* ── TOAST ── */
  #toast {
    position:fixed; bottom:26px; left:50%;
    transform:translateX(-50%) translateY(80px);
    background:#3d2b1f; color:#fff;
    font-family:'Fredoka One',cursive; font-size:1rem;
    padding:10px 26px; border-radius:40px;
    box-shadow:0 6px 20px rgba(0,0,0,.2);
    pointer-events:none; z-index:300;
    transition:transform .3s cubic-bezier(.34,1.56,.64,1); white-space:nowrap;
  }
  #toast.show { transform:translateX(-50%) translateY(0); }

  /* ── MOBILE ── */
  @media (max-width:600px) {
    :root { --hdr:52px; --tbw:100%; }
    .app-body { flex-direction:column-reverse; }
    .toolbar {
      width:100%; height:auto; flex-direction:row; flex-wrap:nowrap;
      border-right:none; border-top:3px solid var(--border);
      padding:8px 10px; overflow-x:auto; overflow-y:hidden;
      gap:8px; align-items:center; box-shadow:0 -3px 12px rgba(255,140,0,.10);
    }
    .tb-label,.tb-div { display:none; }
    .tb-btn { margin-bottom:0; flex-shrink:0; }
    .color-grid { display:flex; flex-direction:row; gap:8px; width:auto; padding:0; margin-bottom:0; }
    .swatch { flex-shrink:0; }
    .brush-wrap { flex-direction:row; gap:6px; margin-bottom:0; }
    .custom-wrap { flex-direction:row; gap:4px; margin-top:0; }
    #brushSize { width:52px; }
  }
  </style>
</head>
<body>

<!-- SPLASH -->
<div id="splash">
  <div id="splashBg"></div>
  <div class="orb o1"></div><div class="orb o2"></div><div class="orb o3"></div>
  <div class="orb o4"></div><div class="orb o5"></div>
  <!-- Big background logo — full screen, behind text -->
  <div id="splashLogoBg">
    <img src="sixty-seven-coloring.png" alt=""
         onerror="this.style.display='none';this.nextElementSibling.style.display='block'"/>
    <div class="logo-fb" style="display:none">🎨</div>
  </div>

  <div id="splashContent">
    <div id="splashWelcome">Welcome To:</div>
    <div id="splashTitle">Sixty-Seven-Coloring</div>
    <div id="splashCredit">Created by <span id="glitchName" data-text="HattyHats">HattyHats</span></div>
    <button id="enterBtn" onclick="enterApp()">▶ Enter</button>
  </div>
</div>

<!-- MAIN APP -->
<div id="app">
  <header>
    <div class="logo">Sixty-Seven 🎨</div>
    <div class="page-pills" id="pagePills">
      <button class="pill active" data-page="rocket">🚀 Rocket</button>
      <button class="pill" data-page="dino">🦕 Dino</button>
      <button class="pill" data-page="butterfly">🦋 Butterfly</button>
      <button class="pill" data-page="fish">🐟 Fish</button>
      <button class="pill" data-page="house">🏠 House</button>
      <button class="pill" data-page="sun">☀️ Sun</button>
      <button class="pill" data-page="cat">🐱 Cat</button>
      <button class="pill" data-page="dog">🐶 Dog</button>
      <button class="pill pill-upload" id="btnUpload">📁 Upload</button>
    </div>
    <input type="file" id="fileInput" accept="image/*,.svg"/>
  </header>

  <div class="app-body">
    <div class="toolbar">
      <div class="tb-label">Tools</div>
      <button class="tb-btn af" id="btnFill">🪣<span class="lbl">Fill</span></button>
      <button class="tb-btn"    id="btnDraw">✏️<span class="lbl">Draw</span></button>
      <button class="tb-btn"    id="btnEraser">🧽<span class="lbl">Erase</span></button>
      <button class="tb-btn"    id="btnUndo">↩️<span class="lbl">Undo</span></button>
      <button class="tb-btn"    id="btnClear">🗑️<span class="lbl">Clear</span></button>
      <button class="tb-btn"    id="btnSave">💾<span class="lbl">Save</span></button>
      <div class="tb-div"></div>
      <div class="tb-label">Brush</div>
      <div class="brush-wrap">
        <input type="range" id="brushSize" min="4" max="40" value="14"/>
        <div id="brushLbl">14px</div>
      </div>
      <div class="tb-div"></div>
      <div class="tb-label">Colors</div>
      <div class="color-grid" id="colorGrid">
        <div class="swatch on" style="background:#e63946" data-c="#e63946"></div>
        <div class="swatch" style="background:#f4701b" data-c="#f4701b"></div>
        <div class="swatch" style="background:#ffd93d" data-c="#ffd93d"></div>
        <div class="swatch" style="background:#57cc04" data-c="#57cc04"></div>
        <div class="swatch" style="background:#06d6a0" data-c="#06d6a0"></div>
        <div class="swatch" style="background:#4d96ff" data-c="#4d96ff"></div>
        <div class="swatch" style="background:#9b5de5" data-c="#9b5de5"></div>
        <div class="swatch" style="background:#f15bb5" data-c="#f15bb5"></div>
        <div class="swatch" style="background:#a0522d" data-c="#a0522d"></div>
        <div class="swatch" style="background:#888888" data-c="#888888"></div>
        <div class="swatch" style="background:#ffffff;border-color:#ccc" data-c="#ffffff"></div>
        <div class="swatch" style="background:#111111" data-c="#111111"></div>
      </div>
      <div class="custom-wrap">
        <input type="color" id="customColor" value="#e63946" title="Custom color"/>
        <div class="tb-label">Custom</div>
      </div>
    </div>

    <div class="canvas-area" id="canvasArea">
      <canvas id="mainCanvas"></canvas>
      <div id="loadOvl">Loading… 🎨</div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
"use strict";
/* ================================================================
   HOW THE FILL WORKS — single-canvas approach
   ================================================================
   Instead of layering canvases (which caused click-blocking and
   CORS/taint issues with SVG drawImage), we use ONE canvas.

   State is kept in two ImageData buffers:
     • colorLayer  — the colors the user has painted
     • outlineLayer — the SVG outline pixels (walls for flood fill)

   Each frame we composite: white bg → colorLayer → outlineLayer.

   Flood fill reads outlineLayer to find walls, writes to colorLayer,
   then recomposites. No CORS, no z-index pointer-event issues.
   ================================================================ */

/* ── SVG pages ── */
const PAGES = {

rocket:{label:"Rocket",svg:`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500">

<circle cx="75" cy="385" r="4" fill="none" stroke="#111" stroke-width="3"/>
<circle cx="430" cy="350" r="5" fill="none" stroke="#111" stroke-width="3"/>
<circle cx="155" cy="440" r="3" fill="none" stroke="#111" stroke-width="3"/>
<circle cx="375" cy="435" r="4" fill="none" stroke="#111" stroke-width="3"/>
<path d="M250,50 C196,50 155,126 150,224 L350,224 C345,126 304,50 250,50 Z" fill="white" stroke="#111" stroke-width="5" stroke-linejoin="round"/>
<circle cx="250" cy="168" r="35" fill="white" stroke="#111" stroke-width="5"/>
<circle cx="250" cy="168" r="20" fill="white" stroke="#111" stroke-width="3.5"/>
<ellipse cx="250" cy="84" rx="27" ry="27" fill="white" stroke="#111" stroke-width="4"/>
<rect x="150" y="224" width="200" height="114" rx="8" fill="white" stroke="#111" stroke-width="5"/>
<line x1="205" y1="234" x2="205" y2="328" stroke="#111" stroke-width="3"/>
<line x1="295" y1="234" x2="295" y2="328" stroke="#111" stroke-width="3"/>
<path d="M150,244 C114,264 90,317 96,338 L150,316 Z" fill="white" stroke="#111" stroke-width="5" stroke-linejoin="round"/>
<path d="M350,244 C386,264 410,317 404,338 L350,316 Z" fill="white" stroke="#111" stroke-width="5" stroke-linejoin="round"/>
<path d="M150,338 C155,362 196,377 250,377 C304,377 345,362 350,338 Z" fill="white" stroke="#111" stroke-width="5" stroke-linejoin="round"/>
<path d="M196,377 C180,397 170,428 186,453 C208,432 230,422 250,427 C270,422 292,432 314,453 C330,428 320,397 304,377 Z" fill="white" stroke="#111" stroke-width="5" stroke-linejoin="round"/>
<path d="M222,382 C211,402 215,424 232,438 C239,425 250,418 261,418 C272,418 283,425 268,438 C285,424 289,402 278,382 Z" fill="white" stroke="#111" stroke-width="4" stroke-linejoin="round"/>
</svg>`},

};

/* ── State ── */
const CW = 500, CH = 500;
let activeTool = 'fill';
let activeColor = '#e63946';
let brushPx = 14;
let isDrawing = false, lastX = 0, lastY = 0;
const undoStack = [];
const MAX_UNDO = 40;

/* ── The two data layers (both 500×500, RGBA) ── */
let colorLayer   = null; // user's painted colors — ImageData
let outlineLayer = null; // baked SVG outline pixels — Uint8ClampedArray

/* ── DOM ── */
const mainCanvas = document.getElementById('mainCanvas');
const ctx        = mainCanvas.getContext('2d', { willReadFrequently: true });
const canvasArea = document.getElementById('canvasArea');
const loadOvl    = document.getElementById('loadOvl');
const toastEl    = document.getElementById('toast');
const pagePills  = document.getElementById('pagePills');
const colorGrid  = document.getElementById('colorGrid');
const brushInput = document.getElementById('brushSize');
const brushLbl   = document.getElementById('brushLbl');
const customClr  = document.getElementById('customColor');
const fileInput  = document.getElementById('fileInput');

/* ── Sizing ── */
let displayScale = 1;

function resize() {
  const ar  = canvasArea.getBoundingClientRect();
  if (!ar.width || !ar.height) return;
  const pad = 16;
  displayScale = Math.min((ar.width - pad*2)/CW, (ar.height - pad*2)/CH, 2);
  const dw = Math.round(CW * displayScale);
  const dh = Math.round(CH * displayScale);

  // Preserve drawings across resize
  const prevColor = colorLayer ? colorLayer : null;

  mainCanvas.width  = CW;
  mainCanvas.height = CH;
  mainCanvas.style.width  = dw + 'px';
  mainCanvas.style.height = dh + 'px';

  if (!colorLayer) colorLayer = ctx.createImageData(CW, CH);
  composite();
}

const ro = new ResizeObserver(resize);
ro.observe(canvasArea);

/* ── Composite: draw white bg + colorLayer + outlineLayer onto mainCanvas ── */
function composite() {
  // 1. White background
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, CW, CH);
  // 2. Color fills
  if (colorLayer) ctx.putImageData(colorLayer, 0, 0);
  // 3. Outline on top (using globalCompositeOperation to only paint dark pixels)
  if (outlineLayer) {
    // Build a temp ImageData from outline and stamp it with 'multiply' or just draw it
    const tmp = ctx.createImageData(CW, CH);
    tmp.data.set(outlineLayer);
    // Put outline as separate canvas to use drawImage with composite op
    outlineTmp.width = CW; outlineTmp.height = CH;
    outlineTmpCtx.putImageData(tmp, 0, 0);
    ctx.drawImage(outlineTmp, 0, 0);
  }
}

// Temp canvas for outline stamping
const outlineTmp    = document.createElement('canvas');
const outlineTmpCtx = outlineTmp.getContext('2d');

/* ── Load page ── */
function loadPage(key) {
  const page = PAGES[key];
  if (!page) return;
  loadOvl.classList.remove('gone');

  // Reset color layer
  colorLayer = null;

  // Parse SVG string into an Image via blob URL, draw onto offscreen canvas
  const blob = new Blob([page.svg], { type: 'image/svg+xml;charset=utf-8' });
  const url  = URL.createObjectURL(blob);
  const img  = new Image();

  img.onload = () => {
    URL.revokeObjectURL(url);

    // Draw SVG onto an offscreen canvas to extract pixel data
    const off    = document.createElement('canvas');
    off.width    = CW;
    off.height   = CH;
    const offCtx = off.getContext('2d', { willReadFrequently: true });
    offCtx.drawImage(img, 0, 0, CW, CH);

    const rawData = offCtx.getImageData(0, 0, CW, CH).data;

    // Build outlineLayer: keep only non-white pixels (the dark lines)
    // White/near-white pixels become fully transparent so they don't
    // cover the color fills. Dark pixels stay opaque.
    const outData = new Uint8ClampedArray(CW * CH * 4);
    for (let i = 0; i < rawData.length; i += 4) {
      const r = rawData[i], g = rawData[i+1], b = rawData[i+2];
      const isWhitish = r > 220 && g > 220 && b > 220;
      if (isWhitish) {
        // Transparent — let color fill show through
        outData[i] = outData[i+1] = outData[i+2] = outData[i+3] = 0;
      } else {
        // Keep the outline pixel fully opaque
        outData[i]   = r;
        outData[i+1] = g;
        outData[i+2] = b;
        outData[i+3] = 255;
      }
    }
    outlineLayer = outData;

    // Fresh empty color layer
    colorLayer = ctx.createImageData(CW, CH);
    // Start with all-transparent (white comes from composite bg)

    undoStack.length = 0;
    resize();
    composite();
    setTimeout(() => loadOvl.classList.add('gone'), 80);
  };

  img.onerror = () => {
    URL.revokeObjectURL(url);
    loadOvl.classList.add('gone');
    toast('Could not load page 😕');
  };

  img.src = url;
}

/* ── Flood fill ── */
function hexToRgb(hex) {
  const h = hex.replace('#','');
  return [parseInt(h.slice(0,2),16), parseInt(h.slice(2,4),16), parseInt(h.slice(4,6),16)];
}

function isOutlinePixel(pos) {
  // A pixel is a wall if the outline layer has a dark opaque pixel here
  if (!outlineLayer) return false;
  const i = pos * 4;
  return outlineLayer[i+3] > 60; // any non-transparent outline pixel = wall
}

function floodFill(sx, sy) {
  if (!outlineLayer || !colorLayer) return;
  const [fr, fg, fb] = hexToRgb(activeColor);

  const pos0 = sy * CW + sx;
  if (isOutlinePixel(pos0)) return; // clicked on an outline — do nothing

  pushUndo();

  const cd = colorLayer.data;

  // What color is currently at the start pixel in the color layer?
  const si    = pos0 * 4;
  const startR = cd[si];
  const startG = cd[si+1];
  const startB = cd[si+2];
  const startA = cd[si+3]; // 0 = unfilled (shows white bg), 255 = filled

  // If the region is already exactly this color, nothing to do
  if (startA === 255 && startR === fr && startG === fg && startB === fb) return;

  const TOL = 20;
  function matches(pi) {
    // Match if same fill state as start pixel
    const a = cd[pi+3];
    if (startA === 0) return a === 0; // both unfilled
    return a === 255 &&
      Math.abs(cd[pi]   - startR) <= TOL &&
      Math.abs(cd[pi+1] - startG) <= TOL &&
      Math.abs(cd[pi+2] - startB) <= TOL;
  }

  const visited = new Uint8Array(CW * CH);
  const stack   = [pos0];

  while (stack.length) {
    const pos = stack.pop();
    if (visited[pos]) continue;
    if (isOutlinePixel(pos)) continue; // wall

    const pi = pos * 4;
    if (!matches(pi)) continue;

    visited[pos] = 1;
    cd[pi]   = fr;
    cd[pi+1] = fg;
    cd[pi+2] = fb;
    cd[pi+3] = 255;

    const x = pos % CW;
    const y = (pos / CW) | 0;
    if (x > 0)      stack.push(pos - 1);
    if (x < CW - 1) stack.push(pos + 1);
    if (y > 0)      stack.push(pos - CW);
    if (y < CH - 1) stack.push(pos + CW);
  }

  composite();
}

/* ── Undo / Clear ── */
function pushUndo() {
  if (undoStack.length >= MAX_UNDO) undoStack.shift();
  // Deep-copy colorLayer data
  const copy = ctx.createImageData(CW, CH);
  copy.data.set(colorLayer.data);
  undoStack.push(copy);
}
function undo() {
  if (!undoStack.length) { toast('Nothing to undo!'); return; }
  colorLayer = undoStack.pop();
  composite();
  toast('Undone ↩️');
}
function clearColors() {
  undoStack.length = 0;
  colorLayer = ctx.createImageData(CW, CH);
  composite();
  toast('Cleared! 🧹');
}

/* ── Draw / Erase directly onto colorLayer ── */
function drawAt(x, y, isFirst) {
  if (!colorLayer) return;
  // Draw into a temporary canvas, then merge into colorLayer
  const tmpC   = document.createElement('canvas');
  tmpC.width   = CW; tmpC.height = CH;
  const tmpCtx = tmpC.getContext('2d');

  // Restore current colorLayer onto tmp
  tmpCtx.putImageData(colorLayer, 0, 0);

  tmpCtx.lineWidth   = brushPx;
  tmpCtx.lineCap     = 'round';
  tmpCtx.lineJoin    = 'round';

  if (activeTool === 'eraser') {
    tmpCtx.globalCompositeOperation = 'destination-out';
    tmpCtx.strokeStyle = 'rgba(0,0,0,1)';
    tmpCtx.fillStyle   = 'rgba(0,0,0,1)';
  } else {
    tmpCtx.globalCompositeOperation = 'source-over';
    tmpCtx.strokeStyle = activeColor;
    tmpCtx.fillStyle   = activeColor;
  }

  if (isFirst) {
    tmpCtx.beginPath();
    tmpCtx.arc(x, y, brushPx/2, 0, Math.PI*2);
    tmpCtx.fill();
  } else {
    tmpCtx.beginPath();
    tmpCtx.moveTo(lastX, lastY);
    tmpCtx.lineTo(x, y);
    tmpCtx.stroke();
  }

  colorLayer = tmpCtx.getImageData(0, 0, CW, CH);
  composite();
}

/* ── Canvas pointer events ── */
function getXY(e) {
  const r  = mainCanvas.getBoundingClientRect();
  const cx = e.clientX ?? (e.touches?.[0]?.clientX ?? 0);
  const cy = e.clientY ?? (e.touches?.[0]?.clientY ?? 0);
  return [
    Math.round((cx - r.left) * (CW / r.width)),
    Math.round((cy - r.top)  * (CH / r.height))
  ];
}

mainCanvas.addEventListener('pointerdown', e => {
  e.preventDefault();
  const [x, y] = getXY(e);
  if (x < 0 || x >= CW || y < 0 || y >= CH) return;

  if (activeTool === 'fill') {
    floodFill(x, y);
  } else {
    isDrawing = true;
    pushUndo();
    drawAt(x, y, true);
    [lastX, lastY] = [x, y];
  }
}, { passive: false });

mainCanvas.addEventListener('pointermove', e => {
  if (!isDrawing) return;
  e.preventDefault();
  const [x, y] = getXY(e);
  drawAt(x, y, false);
  [lastX, lastY] = [x, y];
}, { passive: false });

['pointerup','pointercancel','pointerleave'].forEach(ev =>
  mainCanvas.addEventListener(ev, () => isDrawing = false));

mainCanvas.addEventListener('touchmove', e => e.preventDefault(), { passive: false });

/* ── Tool switching ── */
function setTool(t) {
  activeTool = t;
  document.getElementById('btnFill').classList.toggle('af', t === 'fill');
  document.getElementById('btnDraw').classList.toggle('ad', t === 'draw');
  document.getElementById('btnEraser').classList.toggle('ae', t === 'eraser');
  mainCanvas.style.cursor = t === 'fill' ? 'crosshair' : 'crosshair';
}

/* ── Color ── */
function pickColor(hex) {
  activeColor = hex;
  colorGrid.querySelectorAll('.swatch').forEach(s =>
    s.classList.toggle('on', s.dataset.c === hex));
}

/* ── Save ── */
function saveImage() {
  // Create a clean composite for saving
  const tmp    = document.createElement('canvas');
  tmp.width    = CW; tmp.height = CH;
  const tCtx   = tmp.getContext('2d');
  tCtx.fillStyle = '#fff';
  tCtx.fillRect(0, 0, CW, CH);
  if (colorLayer) tCtx.putImageData(colorLayer, 0, 0);
  if (outlineLayer) {
    outlineTmp.width = CW; outlineTmp.height = CH;
    const tmpID = tCtx.createImageData(CW, CH);
    tmpID.data.set(outlineLayer);
    outlineTmpCtx.putImageData(tmpID, 0, 0);
    tCtx.drawImage(outlineTmp, 0, 0);
  }
  const a = document.createElement('a');
  a.download = 'sixty-seven.png';
  a.href = tmp.toDataURL('image/png');
  a.click();
  toast('Saved! 💾');
}

/* ── Upload ── */
function handleUpload(file) {
  if (!file || !file.type.startsWith('image/')) { toast('Pick an image or SVG 🖼️'); return; }

  const name = file.name.replace(/\.[^.]+$/,'').slice(0,14);
  const isSvg = file.type === 'image/svg+xml' || file.name.endsWith('.svg');
  const reader = new FileReader();

  reader.onload = ev => {
    const key = 'up_' + Date.now();

    if (isSvg) {
      PAGES[key] = { label: name, svg: ev.target.result };
    } else {
      // For raster images, wrap in an SVG so it goes through same pipeline
      const dataUrl = ev.target.result;
      PAGES[key] = { label: name, svg:
        `<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 500 500">
          <image href="${dataUrl}" x="0" y="0" width="500" height="500" preserveAspectRatio="xMidYMid meet"/>
        </svg>`
      };
    }

    const pill = document.createElement('button');
    pill.className = 'pill';
    pill.dataset.page = key;
    pill.textContent = '📷 ' + (name.length > 10 ? name.slice(0,10)+'…' : name);
    pagePills.insertBefore(pill, document.getElementById('btnUpload'));
    pagePills.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
    pill.classList.add('active');

    loadPage(key);
    toast('Uploaded! 🎨');
  };

  if (isSvg) reader.readAsText(file);
  else        reader.readAsDataURL(file);
}

/* ── Button wiring ── */
document.getElementById('btnFill').addEventListener('click',   () => setTool('fill'));
document.getElementById('btnDraw').addEventListener('click',   () => setTool('draw'));
document.getElementById('btnEraser').addEventListener('click', () => setTool('eraser'));
document.getElementById('btnUndo').addEventListener('click',   undo);
document.getElementById('btnClear').addEventListener('click',  () => {
  if (confirm('Clear all your coloring? 🧹')) clearColors();
});
document.getElementById('btnSave').addEventListener('click', saveImage);

pagePills.addEventListener('click', e => {
  const p = e.target.closest('.pill');
  if (!p || p.id === 'btnUpload') return;
  pagePills.querySelectorAll('.pill').forEach(b => b.classList.remove('active'));
  p.classList.add('active');
  loadPage(p.dataset.page);
});

brushInput.addEventListener('input', () => {
  brushPx = parseInt(brushInput.value);
  brushLbl.textContent = brushPx + 'px';
});
colorGrid.addEventListener('click', e => { const s = e.target.closest('.swatch'); if (s) pickColor(s.dataset.c); });
colorGrid.addEventListener('touchend', e => { const s = e.target.closest('.swatch'); if (s) { e.preventDefault(); pickColor(s.dataset.c); } }, { passive: false });
customClr.addEventListener('input', () => { activeColor = customClr.value; colorGrid.querySelectorAll('.swatch').forEach(s => s.classList.remove('on')); });
document.getElementById('btnUpload').addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', () => { if (fileInput.files[0]) handleUpload(fileInput.files[0]); fileInput.value = ''; });

/* ── Splash → App ── */
function enterApp() {
  document.getElementById('splash').classList.add('leaving');
  setTimeout(() => {
    document.getElementById('splash').style.display = 'none';
    document.getElementById('app').classList.add('visible');
    resize();
    loadPage('rocket');
  }, 680);
}

/* ── Toast ── */
let toastTimer;
function toast(msg) {
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toastEl.classList.remove('show'), 2200);
}

/* ── Init ── */
setTool('fill');
pickColor('#e63946');
</script>
